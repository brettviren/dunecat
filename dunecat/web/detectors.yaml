# Each entry can set `chip: false` to hide its own chip from the
# detector bar and surface only inside the "More detectors…" dropdown.
# Omitting the field keeps the chip visible (back-compat default).

- id: protodune-hd
  name: ProtoDUNE-HD
  namespaces:
    - hd-protodune
    - hd-protodune-det-reco
  condb_folder: pdunesp.run_conditionstest
  wiki: https://wiki.dunescience.org/wiki/ProtoDUNE-HD_Data_Catalogue

- id: protodune-vd
  name: ProtoDUNE-VD
  namespaces:
    - vd-protodune
    - vd-protodune-det-reco
    - vd-protodune-top
    - dc25-vd-protodune
  condb_folder: pdunesp.run_conditions_vd
  wiki: https://wiki.dunescience.org/wiki/ProtoDUNE_Vertical_Drift_operation_status

- id: fardet-hd
  name: DUNE FD-HD
  namespaces:
    - fardet-hd

- id: fardet-vd
  name: DUNE FD-VD
  namespaces:
    - fardet-vd

